# 手动运行时设置 COMPONENT=backend，只构建并部署后端。
when:
  - event: manual
    branch: main
    evaluate: 'COMPONENT == "backend"'

concurrency:
  # 前后端部署共用同一组锁，避免两个发布同时覆盖服务器文件。
  limit: 1
  group: ability-re-deploy

steps:
  # 先运行测试，再复用编译结果打出可执行 JAR。
  build:
    image: maven:3.9.9-eclipse-temurin-21
    environment:
      MAVEN_OPTS: "-Xms64m -Xmx320m -XX:MaxMetaspaceSize=160m"
      MAVEN_REPO_LOCAL: "/tmp/ability-re-maven-repository"
    commands:
      - cd backend
      - rm -rf "$MAVEN_REPO_LOCAL"
      - mvn -B -ntp -s ../.woodpecker/maven-settings.xml -Dmaven.repo.local="$MAVEN_REPO_LOCAL" -DforkCount=0 test
      - mvn -B -ntp -s ../.woodpecker/maven-settings.xml -Dmaven.repo.local="$MAVEN_REPO_LOCAL" -DskipTests package

  # 发布包只携带后端 JAR 和启动它所需的 Compose 配置。
  package:
    image: alpine:3.20
    depends_on:
      - build
    commands:
      - mkdir -p dist
      - cp backend/target/backend-0.0.1-SNAPSHOT.jar dist/ability-re-backend.jar
      - tar -czf ability-re-backend-release.tar.gz dist/ability-re-backend.jar docker-compose.yml
      - tar -tzf ability-re-backend-release.tar.gz >/dev/null

  # 通过 SSH 上传发布包，再由服务器上的脚本完成原子替换和健康检查。
  deploy:
    image: alpine:3.20
    depends_on:
      - package
    environment:
      DEPLOY_HOST:
        from_secret: deploy_host
      DEPLOY_PORT:
        from_secret: deploy_port
      DEPLOY_USER:
        from_secret: deploy_user
      DEPLOY_PATH:
        from_secret: deploy_path
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache openssh-client
      - test -n "$DEPLOY_HOST"
      - test -n "$DEPLOY_USER"
      - test -n "$DEPLOY_PATH"
      - test -n "$DEPLOY_SSH_KEY"
      - mkdir -p ~/.ssh
      - printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - install -m 600 .woodpecker/known_hosts ~/.ssh/known_hosts
      - scp -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -i ~/.ssh/id_ed25519 -P "${DEPLOY_PORT:-22}" ability-re-backend-release.tar.gz .woodpecker/deploy-backend.sh "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"
      - ssh -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" sh /tmp/deploy-backend.sh "$DEPLOY_PATH" /tmp/ability-re-backend-release.tar.gz
