# Woodpecker CI 配置文件。
# 作用：代码推送到 GitHub 后，Woodpecker 会按下面的步骤自动构建、测试、打包、部署项目。

# 触发条件：只有 push 到 main 分支时才运行这条流水线。
when:
  - event: push
    branch: main

# steps 下面定义流水线步骤。
# 每个步骤都会在一个 Docker 镜像容器里执行 commands 里的命令。
steps:
  # 后端步骤：使用 Maven + Java 21 镜像，进入 backend 目录后执行测试和打包。
  backend:
    image: maven:3.9.9-eclipse-temurin-21
    commands:
      - cd backend
      - mvn -B test package

  # 前端步骤：使用 Node 22 镜像，安装依赖、检查代码、测试并构建前端。
  frontend:
    image: node:22-alpine
    commands:
      - corepack enable
      - cd frontend
      - pnpm install --frozen-lockfile
      - pnpm lint
      - pnpm test
      - pnpm build

  # 打包步骤：等 backend 和 frontend 都成功后，把后端 jar 和前端产物打成发布包。
  package:
    image: alpine:3.20
    # depends_on 表示这个步骤必须等 backend、frontend 完成后才执行。
    depends_on:
      - backend
      - frontend
    commands:
      - mkdir -p dist
      - cp backend/target/backend-0.0.1-SNAPSHOT.jar dist/ability-re-backend.jar
      - tar -czf dist/ability-re-frontend.tar.gz -C frontend .svelte-kit package.json pnpm-lock.yaml svelte.config.js vite.config.ts
      - tar -czf ability-re-release.tar.gz dist docker-compose.yml README.md

  # 部署步骤：等 package 成功后，通过 SSH 把发布包上传到服务器并解压。
  deploy:
    image: alpine:3.20
    depends_on:
      - package
    # environment 里的值来自 Woodpecker 仓库设置里的 Secrets。
    # 这些敏感信息不要直接写在配置文件里，要在 Woodpecker 页面配置。
    environment:
      DEPLOY_HOST:
        from_secret: deploy_host
      DEPLOY_PORT:
        from_secret: deploy_port
      DEPLOY_USER:
        from_secret: deploy_user
      DEPLOY_PATH:
        from_secret: deploy_path
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
      DEPLOY_RESTART_CMD:
        from_secret: deploy_restart_cmd
    commands:
      # 安装 SSH/SCP 工具。
      - apk add --no-cache openssh-client
      # 检查必要的部署参数是否存在，缺少就直接失败，避免部署到错误位置。
      - test -n "$DEPLOY_HOST"
      - test -n "$DEPLOY_USER"
      - test -n "$DEPLOY_PATH"
      # 写入 SSH 私钥，用它连接部署服务器。
      - mkdir -p ~/.ssh
      - printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      # 信任目标服务器，并把发布包上传到服务器 /tmp 目录。
      - ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - scp -P "${DEPLOY_PORT:-22}" ability-re-release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/ability-re-release.tar.gz"
      # 在服务器上创建部署目录，并把发布包解压进去。
      - ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH' && tar -xzf /tmp/ability-re-release.tar.gz -C '$DEPLOY_PATH'"
      # 如果配置了 deploy_restart_cmd，就在服务器上执行重启命令；没配置则只上传文件。
      - |
        if [ -n "$DEPLOY_RESTART_CMD" ]; then
          ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "$DEPLOY_RESTART_CMD"
        else
          echo "DEPLOY_RESTART_CMD is empty; files uploaded only."
        fi
