services:
  mysql:
    image: mysql:8.4
    container_name: ability-re-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ability_re
      MYSQL_USER: ability_re
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-CHANGE_ME}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGE_ME_ROOT}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ability_re_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uability_re -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ability_re_mysql_data:
