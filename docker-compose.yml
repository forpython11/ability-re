services:
  mysql:
    image: mysql:8.4
    container_name: ability-re-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ability_re
      MYSQL_USER: ability_re
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ability_re_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uability_re -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: eclipse-temurin:21-jre-alpine
    container_name: ability-re-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: "jdbc:mysql://mysql:3306/ability_re?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      DB_USERNAME: "ability_re"
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}
      SERVER_PORT: "18080"
      CORS_ALLOWED_ORIGINS: "http://8.136.60.154:18081"
    ports:
      - "127.0.0.1:18080:18080"
    volumes:
      - ./dist/ability-re-backend.jar:/app/ability-re-backend.jar:ro
    command: ["java", "-jar", "/app/ability-re-backend.jar"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 10s

  frontend:
    image: nginx:1.27-alpine
    container_name: ability-re-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "18081:80"
    volumes:
      - ./dist/frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 3s
      timeout: 5s
      retries: 20

volumes:
  ability_re_mysql_data:
