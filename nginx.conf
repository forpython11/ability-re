# 联系入口单独限流，防止单个地址高频提交请求。
limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;

server {
    listen 80;
    server_name _;
    client_max_body_size 16k;

    # 精确匹配联系接口，并在转发前应用更严格的请求频率限制。
    location = /api/contact {
        limit_req zone=contact burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:18080/api/contact;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其他 API 直接转发给 Spring Boot 容器。
    location /api/ {
        proxy_pass http://backend:18080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 非 API 请求交给 SvelteKit Node 服务完成服务端渲染。
    location / {
        proxy_pass http://frontend-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
